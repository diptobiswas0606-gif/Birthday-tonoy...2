<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Tonoy 🎂</title>

<style>
html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
  background:linear-gradient(135deg,#ffe0ec,#d0f0ff);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 📱 FULL CARD */
.card{
  width:100%;
  height:100%;
  max-width:500px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
  box-sizing:border-box;
}

h1{color:#ff4d6d;margin:5px}

/* 📅 DATE */
.date{
  font-size:18px;
  font-weight:bold;
  color:#c77dff;
  animation:glow 1.5s infinite;
}
@keyframes glow{
  0%,100%{opacity:1;}
  50%{opacity:0.5;}
}

/* 📸 PHOTO */
.photo{
  width:130px;
  height:130px;
  border-radius:50%;
  overflow:hidden;
  border:4px solid #ff4d6d;
  margin:10px 0;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 🎂 CAKE */
.cake{
  position:relative;
  width:140px;
  height:90px;
  margin:15px 0;
  cursor:pointer;
}

.cake-half{
  position:absolute;
  width:50%;
  height:100%;
  background:#ff8fab;
  top:0;
  transition:1s;
}

.cake-half.left{left:0;border-radius:10px 0 0 10px;}
.cake-half.right{right:0;border-radius:0 10px 10px 0;}

.cake.cut .left{transform:translateX(-30px) rotate(-10deg);}
.cake.cut .right{transform:translateX(30px) rotate(10deg);}

/* 🕯️ CANDLE */
.candle{
  position:absolute;
  top:-30px;
  left:50%;
  transform:translateX(-50%);
  width:8px;
  height:25px;
  background:#fff;
  border-radius:3px;
  cursor:pointer;
}

.flame{
  position:absolute;
  top:-15px;
  left:50%;
  transform:translateX(-50%);
  width:10px;
  height:15px;
  background:orange;
  border-radius:50%;
  animation:flicker 0.2s infinite;
}

@keyframes flicker{
  0%,100%{transform:translateX(-50%) scale(1);}
  50%{transform:translateX(-50%) scale(1.2);}
}

.smoke{
  position:absolute;
  top:-20px;
  left:50%;
  width:8px;
  height:8px;
  background:gray;
  border-radius:50%;
  opacity:0;
  transform:translateX(-50%);
}

.smoke.active{
  animation:smokeRise 1.5s forwards;
}

@keyframes smokeRise{
  0%{opacity:0.8; transform:translate(-50%,0);}
  100%{opacity:0; transform:translate(-50%,-50px);}
}

/* 🎁 GIFT */
.gift{
  font-size:60px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}
.gift:hover{transform:scale(1.2)}

.msg{
  margin-top:10px;
  color:#e05585;
  font-weight:bold;
  opacity:0;
  transition:0.5s;
}

/* 🎊 CONFETTI */
.confetti{
  position:fixed;
  width:8px;
  height:12px;
  top:-10px;
  animation:fall linear forwards;
  z-index:10;
}
@keyframes fall{
  to{transform:translateY(110vh) rotate(720deg);}
}

/* 🎈 BALLOON */
.balloon{
  position:fixed;
  bottom:-120px;
  width:45px;
  height:60px;
  border-radius:50%;
  animation:rise linear forwards;
  z-index:5;
}

.balloon::after{
  content:'';
  position:absolute;
  width:2px;
  height:40px;
  background:rgba(0,0,0,0.2);
  top:60px;
  left:50%;
  transform:translateX(-50%);
}

@keyframes rise{
  0%{transform:translateY(0);}
  100%{transform:translateY(-120vh);}
}

/* TOUCH FIX */
.cake,.gift,.candle{
  -webkit-tap-highlight-color:transparent;
}
</style>
</head>

<body>

<div class="card">

  <h1>🎂 Happy Birthday Tonoy 💖</h1>
  <p class="date">🎉 29 May 🎉</p>

  <!-- 📸 PHOTO -->
  <div class="photo">
    <img src="tonoy.jpg" alt="Tonoy">
  </div>

  <!-- 🎂 CAKE -->
  <div class="cake" onclick="cutCake()">

    <div class="cake-half left"></div>
    <div class="cake-half right"></div>

    <!-- 🕯️ CANDLE -->
    <div class="candle" onclick="blowCandle(event)">
      <div class="flame" id="flame"></div>
      <div class="smoke" id="smoke"></div>
    </div>

  </div>

  <p>Tap cake or candle 🎂🕯️</p>

  <!-- 🎁 GIFT -->
  <div class="gift" onclick="openGift()">🎁</div>
  <p id="msg" class="msg"></p>

</div>

<!-- 🔊 AUDIO -->
<audio id="song" src="birthday.mp3"></audio>

<script>

/* 🎊 CONFETTI */
function confetti(n=60){
  for(let i=0;i<n;i++){
    const c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.background=`hsl(${Math.random()*360},100%,60%)`;
    c.style.animationDuration=(2+Math.random()*3)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  }
}

/* 🎈 BALLOONS */
function balloons(n=20){
  for(let i=0;i<n;i++){
    const b=document.createElement('div');
    b.className='balloon';
    b.style.left=Math.random()*100+'vw';
    b.style.background=`hsl(${Math.random()*360},100%,60%)`;
    b.style.animationDuration=(4+Math.random()*3)+'s';
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),8000);
  }
}

/* 🎂 CAKE CUT */
function cutCake(){
  document.querySelector('.cake').classList.add('cut');
  confetti(70);
}

/* 🕯️ BLOW CANDLE */
function blowCandle(e){
  e.stopPropagation();

  document.getElementById('flame').style.display='none';

  const smoke=document.getElementById('smoke');
  smoke.classList.add('active');

  confetti(40);
}

/* 🎁 GIFT */
function openGift(){
  const msg=document.getElementById('msg');
  const song=document.getElementById('song');

  msg.style.opacity=1;
  msg.innerHTML="🎉 Surprise! Happy Birthday Tonoy! 💖";

  song.play();
  confetti(100);
  balloons(15);
}

</script>

</body>
</html>
